# ==================== 模型配置 ====================
model:
  name: 'yolo11s'  # 可选: yolo11n, yolo11s, yolo11m, yolo11l, yolo11x
  # yolo11n: 2.6M参数，超快速（250+ FPS）
  # yolo11s: 9.4M参数，平衡型（推荐，150 FPS）
  # yolo11m: 20.1M参数，更高精度（100 FPS）
  # yolo11l: 25.3M参数，最高精度（80 FPS）
  # yolo11x: 56.9M参数，极致精度（50 FPS）

  pretrained_weights: null  # 预训练权重路径（可选）
  # pretrained_weights: '/root/autodl-tmp/pretrained/yolo11s.pt'

# ==================== 数据配置 ====================
data:
  # YOLO格式数据集配置文件
  yaml_path: '.../dataset.yaml'

  # 注意: YOLOv11使用YOLO格式数据集

# ==================== 训练配置 ====================
training:
  # 基础训练参数
  epochs: 300              # 训练轮数
  imgsz: 640               # 输入图像尺寸
  batch: 16                # 批大小
  device: 0                # GPU设备ID
  workers: 8               # 数据加载线程数

  # 优化器配置
  optimizer: 'auto'        # auto会自动选择最佳优化器（AdamW）
  lr0: 0.01                # 初始学习率
  lrf: 0.01                # 最终学习率（lr0 * lrf）
  momentum: 0.937          # SGD动量
  weight_decay: 0.0005     # 权重衰减

  # 学习率预热
  warmup_epochs: 3         # 预热轮数
  warmup_momentum: 0.8     # 预热阶段动量
  warmup_bias_lr: 0.1      # 预热阶段bias学习率

  # 训练控制
  patience: 50             # Early stopping等待轮数
  save_period: -1          # 保存间隔（-1表示只保存最后和最佳）

  # 性能优化
  amp: true                # 自动混合精度训练（节省显存，加速30%）
  cache: false             # 缓存图像到内存（小数据集可开启）
  close_mosaic: 10         # 最后N轮关闭mosaic增强

  # 其他
  seed: 0                  # 随机种子
  deterministic: true      # 确定性训练（可复现）

# ==================== 数据增强配置 ====================
augmentation:
  # HSV颜色空间增强
  hsv_h: 0.015             # 色调增强 (0-1)
  hsv_s: 0.7               # 饱和度增强 (0-1)
  hsv_v: 0.4               # 明度增强 (0-1)

  # 几何变换
  degrees: 0.0             # 旋转角度范围（RoboMaster通常不需要旋转）
  translate: 0.1           # 平移范围（图像比例）
  scale: 0.5               # 缩放范围
  shear: 0.0               # 剪切角度
  perspective: 0.0         # 透视变换

  # 翻转
  flipud: 0.0              # 上下翻转概率（通常关闭）
  fliplr: 0.5              # 左右翻转概率

  # Mosaic和MixUp
  mosaic: 1.0              # Mosaic增强概率
  mixup: 0.0               # MixUp增强概率
  copy_paste: 0.0          # Copy-Paste增强

# ==================== 输出配置 ====================
output:
  project: '.../runs'  # 项目输出目录
  name: 'yolo11s_armor'             # 实验名称

# ==================== 实验追踪（可选）====================
experiment:
  use_wandb: false         # 是否使用 Weights & Biases
  wandb_project: 'robomaster-detection'
  wandb_name: 'yolo11-s-armor'
  wandb_entity: null       # W&B团队名称