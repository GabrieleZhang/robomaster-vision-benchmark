model:
  name: 'rtdetr-l'  # 可选: rtdetr-l, rtdetr-x


  pretrained_weights: null  # 预训练权重路径（可选）
  # pretrained_weights: '/root/autodl-tmp/pretrained/rtdetr-l.pt'


data:
  yaml_path: '.../dataset.yaml'




# ==================== 训练配置 ====================
training:
  # 基础训练参数
  epochs: 300
  imgsz: 640
  batch: 16
  device: 0
  workers: 8

  # 优化器配置
  optimizer: 'AdamW'       # RT-DETR推荐使用AdamW
  lr0: 0.0001              # 初始学习率（RT-DETR用较小学习率）
  lrf: 0.01                # 最终学习率（lr0 * lrf）
  momentum: 0.937          # SGD动量（AdamW不使用）
  weight_decay: 0.0005     # 权重衰减

  # 学习率预热
  warmup_epochs: 3         # 预热轮数（RT-DETR建议较少）
  warmup_momentum: 0.8     # 预热阶段动量
  warmup_bias_lr: 0.1      # 预热阶段bias学习率

  # 训练控制
  patience: 50             # Early stopping等待轮数
  save_period: -1          # 保存间隔（-1表示只保存最后和最佳）

  # 性能优化
  amp: true                # 自动混合精度训练（节省显存，加速30%）
  cache: false             # 缓存图像到内存（小数据集可开启）
  close_mosaic: 10         # 最后N轮关闭mosaic增强

  # 其他
  seed: 0                  # 随机种子
  deterministic: true      # 确定性训练（可复现）

# 注意: RT-DETR对数据增强敏感，建议使用较弱的增强
augmentation:
  # HSV颜色空间增强
  hsv_h: 0.015             # 色调增强 (0-1)
  hsv_s: 0.7               # 饱和度增强 (0-1)
  hsv_v: 0.4               # 明度增强 (0-1)

  # 几何变换
  degrees: 0.0             # 旋转角度范围
  translate: 0.1           # 平移范围
  scale: 0.5               # 缩放范围
  shear: 0.0               # 剪切角度
  perspective: 0.0         # 透视变换（

  # 翻转
  flipud: 0.0              # 上下翻转概率
  fliplr: 0.5              # 左右翻转概率

  # Mosaic和MixUp
  mosaic: 0.0              # Mosaic增强概率
  mixup: 0.0               # MixUp增强概率
  copy_paste: 0.0          # Copy-Paste增强


output:
  project: '.../runs'  # 项目输出目录
  name: 'rtdetr_l_armor'
experiment:
  use_wandb: false         # 是否使用 Weights & Biases
  wandb_project: 'robomaster-detection'
  wandb_name: 'rtdetr-l-armor'
  wandb_entity: null